{% extends "base.html" %}

{% block title %}Register | SecureSystem 75{% endblock %}

{% block content %}
<section class="form-shell">
    <form class="card form-card" method="post">
        <p class="eyebrow">Create secure access</p>
        <h2>Create account</h2>
        <p class="form-intro">Register with a unique username and a strong password to begin storing encrypted data.</p>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" minlength="3" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="8" required>

        <button class="button primary" type="submit">Register</button>
    </form>
</section>
{% endblock %}
